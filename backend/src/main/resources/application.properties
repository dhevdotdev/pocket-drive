spring.application.name=pocketdrive

# JPA — Hibernate manages schema (no Flyway)
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# Datasource (override via env vars in production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pocketdrive}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pocketdrive}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pocketdrive}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Security — JWT via Clerk (set CLERK_ISSUER_URI in .env)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${CLERK_ISSUER_URI:}

# R2 / S3
r2.endpoint=${R2_ENDPOINT:}
r2.bucket=${R2_BUCKET:pocket-drive-dev}
r2.region=auto
r2.access-key=${R2_ACCESS_KEY:}
r2.secret-key=${R2_SECRET_KEY:}
r2.presigned-upload-expiry=900
r2.presigned-download-expiry=300

# Upload validation
upload.max-size-bytes=104857600
upload.allowed-types=application/pdf,image/png,image/jpeg,image/gif,text/plain,application/zip

# CORS — allow local frontend dev server
cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# Jackson fix for Hibernate bytecode enhancer + Jackson 3 primitive fields
spring.jackson.deserialization.fail-on-null-for-primitives=false

logging.level.dev.dhev.pocketdrive=DEBUG
